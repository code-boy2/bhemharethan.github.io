<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link rel="stylesheet" href="../css/Booking.css">
</head>

<body class="ethan-booking">

    <!-- BOOKING HEADER -->
    <div class="book">
        <img src="../image/logo.png" class="logo">
        <h2>Ready to Book Your Destination</h2>
    </div>

    <!-- BOOKING -->
    <div class="booking-1">
        <img src="../summer-image/boracay1.jpg" class="booking-img">

        <!-- BOOKING INFO -->
        <div class="booking-info">
            <div class="title-row">
                <div>
                    <h3> Country </h3>
                    <p>7 Nights in Beach All-inclusive</p>
                </div>
                <div class="price">
                    <p>Total Price</p>
                    <h4>AED: 0,000</h4>
                    <span class="discount">Save 00% OFF</span>
                </div>
            </div>
            <div class="all">
                <p>Activities</p>
                <p>Evening Shows</p>
                <p>Free Meals Breakfast and Lunch</p>
                <p>Flight + Transfers Included</p>
            </div>
            <button class="book-btn">
                Book Now — AED: 0,000 per person

            </button>

        </div>
    </div>


    <!-- PAYMENT -->
    <div class="payment">

        <div class="wow">
            <img src="../image/visa.png" alt="Visa">
        </div>
        <div class="wow">
            <img src="../image/paypal.png" alt="PayPal">
        </div>
        <div class="wow">
            <img src="../image/mastercard.png" alt="Mastercard">
        </div>
        <div class="wow">
            <img src="../image/apple.png" alt="Apple Pay">
        </div>
    </div>
    <!-- BACK TO HOME -->
    <a href="welcome.html" class="back-home" style="display: block; text-align: center; margin-top: 20px;">Back to
        Home</a>

</body>
